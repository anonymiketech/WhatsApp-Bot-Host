kind = "web"
previewPath = "/"
title = "ANONYMIKETECH - WhatsApp Bot Platform"
version = "1.0.0"
id = "artifacts/anonymiketech"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20391

[services.development]
run = "pnpm --filter @workspace/anonymiketech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anonymiketech", "run", "build" ]
publicDir = "artifacts/anonymiketech/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20391"
BASE_PATH = "/"
